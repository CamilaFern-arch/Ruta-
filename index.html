<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Reparto - Badalona</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold text-blue-600 mb-4">📦 Nueva Entrega</h2>
        
        <div class="space-y-3">
            <input id="nombre" type="text" placeholder="Nombre del Cliente" class="w-full p-2 border rounded">
            <input id="direccion" type="text" placeholder="Dirección (Ej: Carrer de Mar, 10)" class="w-full p-2 border rounded">
            <input id="telefono" type="tel" placeholder="Teléfono" class="w-full p-2 border rounded">
            <input id="dni" type="text" placeholder="DNI (Opcional)" class="w-full p-2 border rounded">
            <button onclick="guardarContacto()" class="w-full bg-blue-500 text-white p-3 rounded-lg font-bold hover:bg-blue-600">
                Añadir a la Ruta
            </button>
        </div>

        <hr class="my-6">

        <h3 class="text-xl font-semibold mb-3">📍 Ruta del Día</h3>
        <div id="listaContactos" class="space-y-4">
            </div>
    </div>

    <script>
        function guardarContacto() {
            const contacto = {
                nombre: document.getElementById('nombre').value,
                direccion: document.getElementById('direccion').value,
                telefono: document.getElementById('telefono').value,
                dni: document.getElementById('dni').value
            };

            if (!contacto.nombre || !contacto.telefono) {
                alert("Por favor, pon al menos nombre y teléfono");
                return;
            }

            let contactos = JSON.parse(localStorage.getItem('contactos')) || [];
            contactos.push(contacto);
            localStorage.setItem('contactos', JSON.stringify(contactos));
            
            // Limpiar inputs y refrescar lista
            document.querySelectorAll('input').forEach(i => i.value = '');
            mostrarContactos();
        }

        function mostrarContactos() {
            const lista = document.getElementById('listaContactos');
            const contactos = JSON.parse(localStorage.getItem('contactos')) || [];
            lista.innerHTML = '';

            contactos.forEach((c, index) => {
                lista.innerHTML += `
                    <div class="p-4 border border-gray-200 rounded-lg bg-gray-50 relative">
                        <p class="font-bold text-lg">${c.nombre}</p>
                        <p class="text-sm text-gray-600">🏠 ${c.direccion}</p>
                        <p class="text-sm text-gray-600">🆔 DNI: ${c.dni}</p>
                        
                        <div class="flex gap-2 mt-3">
                            <a href="tel:${c.telefono}" class="flex-1 bg-green-500 text-white text-center p-2 rounded text-sm font-bold">
                                📞 Llamar
                            </a>
                            <a href="https://www.google.com/maps/search/${encodeURIComponent(c.direccion + ' Badalona')}" target="_blank" class="flex-1 bg-yellow-500 text-white text-center p-2 rounded text-sm font-bold">
                                🗺️ Mapa
                            </a>
                            <button onclick="borrar(${index})" class="bg-red-100 text-red-600 p-2 rounded">
                                🗑️
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function borrar(index) {
            let contactos = JSON.parse(localStorage.getItem('contactos'));
            contactos.splice(index, 1);
            localStorage.setItem('contactos', JSON.stringify(contactos));
            mostrarContactos();
        }

        // Cargar al iniciar
        mostrarContactos();
    </script>
</body>
</html>
